<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KTX 예매 보조</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div>
          <p class="eyebrow">Local KTX Booking Helper</p>
          <h1>KTX 예매 보조 프로그램</h1>
          <p>
            성인 1명 기준으로 지정된 KTX 구간을 반복 조회하고, 일반실 또는 특실 좌석이 보이면 예약 버튼을 눌러
            결제 직전 단계까지 최대한 이동합니다.
          </p>
        </div>
        <button id="loginButton" class="primary">로그인 브라우저 열기</button>
      </section>

      <div id="error" class="alert hidden"></div>

      <section class="notice">
        <strong>사용 순서</strong>
        <ol>
          <li>로그인 브라우저를 열고 KORAIL 로그인을 직접 완료합니다.</li>
          <li>원하는 작업의 감시 시작 버튼을 누릅니다.</li>
          <li>좌석 발견 시 자동화 브라우저에서 예약/결제 화면을 직접 확인합니다.</li>
        </ol>
      </section>

      <section id="taskGrid" class="grid"><p>상태를 불러오는 중입니다...</p></section>

      <section class="logs">
        <div class="section-title">
          <h2>최근 로그</h2>
          <span id="logCount">0개</span>
        </div>
        <div id="logList" class="log-list"><p class="muted">아직 로그가 없습니다.</p></div>
      </section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
